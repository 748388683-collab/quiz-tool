
<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>刷题助手</title>
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#f4f5f7;
  --surface:#fff;
  --surface2:#f8f9fb;
  --border:#e2e5ea;
  --text:#1a1d23;
  --text2:#5f6875;
  --text3:#8e96a3;
  --primary:#2463eb;
  --primary-hover:#1d54cf;
  --primary-light:#eef3fe;
  --green:#16a34a;
  --green-light:#f0fdf4;
  --red:#dc2626;
  --red-light:#fef2f2;
  --amber:#d97706;
  --amber-light:#fffbeb;
  --radius:8px;
  --shadow:0 1px 3px rgba(0,0,0,.06),0 1px 2px rgba(0,0,0,.04);
  --shadow-lg:0 4px 16px rgba(0,0,0,.08);
  --font:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif;
  --nav-h:56px
}
html,body{height:100%}
body{font-family:var(--font);background:var(--bg);color:var(--text);font-size:15px;line-height:1.6}
a{color:var(--primary);text-decoration:none;cursor:pointer}
a:hover{color:var(--primary-hover)}
button{cursor:pointer;font-family:inherit;font-size:inherit;border:none;background:none}
input,textarea,select{font-family:inherit;font-size:inherit}

/* nav */
.nav{position:fixed;top:0;left:0;right:0;height:var(--nav-h);background:var(--surface);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 24px;z-index:100;gap:32px}
.nav-brand{font-weight:700;font-size:17px;display:flex;align-items:center;gap:8px;color:var(--text);white-space:nowrap}
.nav-brand span{color:var(--primary)}
.nav-links{display:flex;gap:4px;flex:1}
.nav-links a{padding:6px 14px;border-radius:6px;color:var(--text2);font-size:14px;font-weight:500;transition:.15s}
.nav-links a:hover{background:var(--surface2);color:var(--text)}
.nav-links a.active{background:var(--primary-light);color:var(--primary)}
.nav-stats{font-size:13px;color:var(--text3);white-space:nowrap}

/* layout */
.main{padding-top:var(--nav-h);min-height:100vh}
.view{display:none;max-width:820px;margin:0 auto;padding:28px 24px 48px}
.view.active{display:block}

/* cards */
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:24px;margin-bottom:16px}
.card-header{font-size:16px;font-weight:600;margin-bottom:12px;display:flex;align-items:center;gap:8px}
.stat-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:12px;margin-bottom:24px}
.stat-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:16px;text-align:center}
.stat-card .num{font-size:28px;font-weight:700;line-height:1.2}
.stat-card .label{font-size:13px;color:var(--text2);margin-top:4px}
.stat-card.green .num{color:var(--green)}
.stat-card.red .num{color:var(--red)}
.stat-card.blue .num{color:var(--primary)}
.stat-card.amber .num{color:var(--amber)}

/* buttons */
.btn{display:inline-flex;align-items:center;gap:6px;padding:9px 20px;border-radius:6px;font-weight:500;font-size:14px;transition:.15s;border:1px solid transparent}
.btn-primary{background:var(--primary);color:#fff}
.btn-primary:hover{background:var(--primary-hover)}
.btn-outline{background:var(--surface);border-color:var(--border);color:var(--text)}
.btn-outline:hover{background:var(--surface2);border-color:var(--text3)}
.btn-success{background:var(--green);color:#fff}
.btn-success:hover{background:#15803d}
.btn-danger{background:var(--red);color:#fff}
.btn-danger:hover{background:#b91c1c}
.btn-sm{padding:5px 12px;font-size:13px}
.btn:disabled{opacity:.5;cursor:not-allowed}
.btn-group{display:flex;gap:8px;flex-wrap:wrap;margin-top:16px}

/* question */
.q-card{padding:28px 24px;margin-bottom:12px}
.q-meta{display:flex;gap:8px;align-items:center;margin-bottom:12px;flex-wrap:wrap}
.q-type{display:inline-block;padding:2px 10px;border-radius:4px;font-size:12px;font-weight:600}
.q-type.single{background:#eef3fe;color:var(--primary)}
.q-type.multiple{background:#fef3c7;color:var(--amber)}
.q-type.judge{background:#f0fdf4;color:var(--green)}
.q-type.essay{background:#fdf2f8;color:#be185d}
.q-index{font-size:13px;color:var(--text3)}
.q-text{font-size:16px;font-weight:500;margin-bottom:16px;line-height:1.7}
.q-text .blank{display:inline-block;border-bottom:2px solid var(--primary);min-width:80px;padding:0 4px;color:var(--primary);font-weight:600}

/* options */
.options{display:flex;flex-direction:column;gap:8px}
.option{display:flex;align-items:flex-start;gap:10px;padding:10px 14px;border:1px solid var(--border);border-radius:6px;cursor:pointer;transition:.12s;user-select:none}
.option:hover{background:var(--surface2);border-color:var(--text3)}
.option.selected{border-color:var(--primary);background:var(--primary-light)}
.option.correct{border-color:var(--green);background:var(--green-light)}
.option.wrong{border-color:var(--red);background:var(--red-light)}
.option.disabled{cursor:default;opacity:.85}
.option .marker{flex-shrink:0;width:20px;height:20px;border-radius:50%;border:2px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:600;margin-top:1px;transition:.12s}
.option.selected .marker{border-color:var(--primary);background:var(--primary);color:#fff}
.option.correct .marker{border-color:var(--green);background:var(--green);color:#fff}
.option.wrong .marker{border-color:var(--red);background:var(--red);color:#fff}
.option.multi .marker{border-radius:4px}
.option .label{font-weight:500;flex-shrink:0}
.option .text{color:var(--text)}

/* essay input */
.essay-input{width:100%;min-height:100px;padding:12px;border:1px solid var(--border);border-radius:6px;resize:vertical;font-size:15px;line-height:1.7;transition:.12s}
.essay-input:focus{outline:none;border-color:var(--primary);box-shadow:0 0 0 3px rgba(36,99,235,.1)}
.essay-input:disabled{background:var(--surface2);color:var(--text2)}
.essay-result{background:var(--surface2);border:1px solid var(--border);border-radius:6px;padding:12px;margin-top:12px}
.essay-result strong{color:var(--green)}
.essay-result .expected{color:var(--primary);font-weight:500}

/* explanation */
.explanation{margin-top:16px;padding:14px 16px;background:var(--amber-light);border:1px solid #fde68a;border-radius:6px;font-size:14px;line-height:1.7;display:none}
.explanation.show{display:block}
.explanation strong{color:var(--amber)}

/* progress bar */
.progress{display:flex;align-items:center;gap:12px;margin-bottom:20px}
.progress-track{flex:1;height:6px;background:var(--border);border-radius:3px;overflow:hidden}
.progress-fill{height:100%;background:var(--primary);border-radius:3px;transition:width .3s}
.progress-text{font-size:13px;color:var(--text2);white-space:nowrap}

/* nav dots for questions */
.nav-dots{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:16px}
.nav-dot{width:32px;height:32px;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:500;border:1px solid var(--border);cursor:pointer;transition:.12s;background:var(--surface)}
.nav-dot:hover{border-color:var(--primary);color:var(--primary)}
.nav-dot.active{background:var(--primary);color:#fff;border-color:var(--primary)}
.nav-dot.answered{border-color:var(--green);color:var(--green)}
.nav-dot.answered.active{background:var(--green);color:#fff;border-color:var(--green)}

/* result */
.result-header{text-align:center;padding:32px 0 24px}
.result-score{font-size:56px;font-weight:700;line-height:1}
.result-score.pass{color:var(--green)}
.result-score.fail{color:var(--red)}
.result-label{font-size:16px;color:var(--text2);margin-top:8px}
.result-details{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:12px;margin-bottom:24px}
.result-detail{text-align:center;padding:12px;background:var(--surface2);border-radius:6px}
.result-detail .num{font-size:22px;font-weight:700}
.result-detail .label{font-size:13px;color:var(--text2);margin-top:2px}

/* home */
.hero{margin-bottom:28px}
.hero h1{font-size:24px;font-weight:700;margin-bottom:6px}
.hero p{color:var(--text2);font-size:15px}
.quick-actions{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:12px;margin-bottom:24px}
.action-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:20px;cursor:pointer;transition:.15s;display:flex;flex-direction:column;gap:8px}
.action-card:hover{border-color:var(--primary);box-shadow:var(--shadow)}
.action-card .icon{font-size:24px}
.action-card .title{font-weight:600;font-size:15px}
.action-card .desc{font-size:13px;color:var(--text2);line-height:1.5}

/* empty state */
.empty{text-align:center;padding:48px 24px;color:var(--text3)}
.empty .icon{font-size:48px;margin-bottom:12px}
.empty p{font-size:15px}

/* review list */
.review-q{border-left:3px solid;padding:14px 16px;margin-bottom:8px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);border-left:4px solid}
.review-q.correct{border-left-color:var(--green)}
.review-q.wrong{border-left-color:var(--red)}
.review-q .rq-meta{font-size:13px;color:var(--text2);margin-bottom:4px}
.review-q .rq-text{font-weight:500;margin-bottom:4px}
.review-q .rq-answer{font-size:13px}
.review-q .rq-answer .yours{color:var(--red)}
.review-q .rq-answer .correct-ans{color:var(--green)}

/* toast */
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--text);color:#fff;padding:10px 20px;border-radius:8px;font-size:14px;z-index:999;opacity:0;transition:opacity .25s;pointer-events:none}
.toast.show{opacity:1}

/* responsive */
@media(max-width:640px){
  .nav{padding:0 12px;gap:12px}
  .nav-links{gap:2px}
  .nav-links a{padding:5px 10px;font-size:13px}
  .nav-stats{display:none}
  .view{padding:16px 12px 32px}
  .q-card{padding:20px 16px}
  .stat-grid{grid-template-columns:repeat(2,1fr)}
  .result-score{font-size:42px}
  .quick-actions{grid-template-columns:1fr}
  .btn-group{flex-direction:column}
  .btn-group .btn{width:100%;justify-content:center}
}

/* notifications / share */
.notif-btn{position:fixed;bottom:24px;right:24px;width:52px;height:52px;border-radius:50%;background:var(--primary);color:#fff;font-size:22px;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 16px rgba(36,99,235,.35);z-index:50;transition:.2s;border:none;cursor:pointer}
.notif-btn:hover{transform:scale(1.08);box-shadow:0 6px 20px rgba(36,99,235,.45)}
.notif-btn.has-unread::after{content:'';position:absolute;top:8px;right:8px;width:8px;height:8px;border-radius:50%;background:var(--red)}
.notif-panel{position:fixed;bottom:84px;right:24px;width:340px;max-height:460px;background:var(--surface);border:1px solid var(--border);border-radius:12px;box-shadow:var(--shadow-lg);z-index:49;display:none;overflow:hidden;flex-direction:column}
.notif-panel.open{display:flex}
.notif-panel-header{padding:14px 16px;border-bottom:1px solid var(--border);font-weight:600;font-size:15px;display:flex;align-items:center;justify-content:space-between}
.notif-panel-header button{font-size:12px;color:var(--text2)}
.notif-list{flex:1;overflow-y:auto;padding:4px 0}
.notif-item{padding:10px 16px;font-size:13px;border-bottom:1px solid #f0f1f3;display:flex;gap:10px;align-items:flex-start}
.notif-item .icon{font-size:16px;flex-shrink:0;margin-top:1px}
.notif-item .text{flex:1;color:var(--text);line-height:1.5}
.notif-item .time{font-size:11px;color:var(--text3);white-space:nowrap}
.notif-empty{padding:32px;text-align:center;color:var(--text3);font-size:14px}
.share-overlay{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:60;display:none;align-items:center;justify-content:center}
.share-overlay.open{display:flex}
.share-modal{background:var(--surface);border-radius:14px;padding:28px 24px;width:320px;text-align:center;box-shadow:var(--shadow-lg)}
.share-modal h3{margin-bottom:8px;font-size:17px}
.share-modal p{font-size:13px;color:var(--text2);margin-bottom:16px}
.share-modal img{width:180px;height:180px;margin:0 auto 16px;display:block;border:1px solid var(--border);border-radius:8px}
.share-modal .btn{margin-top:8px}
.share-modal .close-btn{position:absolute;top:12px;right:16px;font-size:20px;color:var(--text3);cursor:pointer}

@media(max-width:640px){
  .notif-panel{width:calc(100vw - 32px);right:16px;bottom:76px;max-height:50vh}
  .notif-btn{bottom:16px;right:16px;width:48px;height:48px;font-size:20px}
  .share-modal{width:calc(100vw - 48px)}
}
</style>
</head>

// ── State ──────────────────────────────────────────────────────
const STATE_KEY = 'quiz_app_state';
let state = loadState();

function getDefaultState(){
  return {wrongIds:[],wrongHistory:[]}; // wrongIds: set, wrongHistory: [{questionId, userAnswer, timestamp}]
}
function loadState(){
  try{
    const raw = localStorage.getItem(STATE_KEY);
    if(raw){const d=JSON.parse(raw);return {...getDefaultState(),...d}}
  }catch(e){}
  return getDefaultState();
}
function saveState(){
  localStorage.setItem(STATE_KEY,JSON.stringify(state));
  updateNavStats();
}

// ── Routing ────────────────────────────────────────────────────
function showView(id){
  document.querySelectorAll('.view').forEach(v=>v.classList.remove('active'));
  const el=document.getElementById('view-'+id);
  if(el)el.classList.add('active');
  document.querySelectorAll('.nav-links a').forEach(a=>a.classList.toggle('active',a.dataset.view===id));
}

document.querySelectorAll('.nav-links a').forEach(a=>{
  a.addEventListener('click',()=>{
    const v=a.dataset.view;
    if(v==='exam'){renderExamConfig();showView('exam-config')}
    else if(v==='home'){renderHome();showView('home')}
    else if(v==='wrong-practice'){renderWrongPractice();showView('wrong-practice')}
    else if(v==='practice'){renderPracticeTypes();showView('practice')}
  });
});

// ── Helpers ────────────────────────────────────────────────────
function shuffle(arr){const a=[...arr];for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]]}return a}
function byType(t){return QUESTION_BANK.filter(q=>q.type===t)}
function getQ(id){return QUESTION_BANK.find(q=>q.id===id)}
function setAnswered(m,k,v){m.set(k,{answered:v,submitted:true})}

function toast(msg){
  const el=document.getElementById('toast');
  el.textContent=msg;el.classList.add('show');
  clearTimeout(el._t);el._t=setTimeout(()=>el.classList.remove('show'),2500);
}

function updateNavStats(){
  const el=document.getElementById('navStats');
  const total=QUESTION_BANK.length;
  const wrong=state.wrongIds.length;
  el.textContent=`题库 ${total} 题 | 错题 ${wrong} 题`;
}

function renderExplanation(exp){
  return `<div class="explanation show"><strong>解析</strong> ${exp}</div>`;
}

function getTypeLabel(t){
  return {single:'单选题',multiple:'多选题',judge:'判断题',essay:'简答题'}[t]||t;
}

// ── Exam ───────────────────────────────────────────────────────
let examState = null;

function beginExam(){
  const count = parseInt(document.getElementById('examCount').value);
  const activeBtns=document.querySelectorAll('#examTypeToggles .exam-type-btn.active');
  if(activeBtns.length===0){alert('请至少选择一种题型');return}
  const types=Array.from(activeBtns).map(b=>b.dataset.type);
  const pool = [];
  const perType = Math.ceil(count/types.length) + 2;
  types.forEach(t=>{
    const qs = shuffle(byType(t));
    pool.push(...qs.slice(0,perType));
  });
  const final = shuffle(pool).slice(0, Math.min(count, pool.length));
  examState = {
    questions: final,
    answers: new Map(), // qid -> user answer
    currentIndex: 0,
    submitted: false,
    results: null
  };
  renderExam();
  showView('exam');
}

function renderExam(){
  if(!examState)return;
  const {questions,answers,currentIndex,submitted,results} = examState;
  const q = questions[currentIndex];
  if(!q)return;

  const total=questions.length;
  const answeredCount=answers.size;
  const container=document.getElementById('view-exam');

  // nav dots
  let dotsHtml='';
  questions.forEach((_,i)=>{
    const qid=questions[i].id;
    const isActive=i===currentIndex?'active':'';
    const isAnswered=answers.has(qid)?'answered':'';
    dotsHtml+=`<div class="nav-dot ${isActive} ${isAnswered}" onclick="examState&&!examState.submitted&&goToExamQ(${i})">${i+1}</div>`;
  });

  const answerHtml = renderQuestion(q, answers.get(q.id), submitted, results);

  container.innerHTML=`
    <div class="progress">
      <div class="progress-track"><div class="progress-fill" style="width:${((currentIndex+1)/total)*100}%"></div></div>
      <div class="progress-text">${currentIndex+1}/${total} · 已答 ${answeredCount} 题</div>
    </div>
    ${submitted?'':`<div class="nav-dots">${dotsHtml}</div>`}
    <div class="card q-card">${answerHtml}</div>
    ${submitted?'':`<div class="btn-group">
      <button class="btn btn-outline" onclick="prevExamQ()" ${currentIndex===0?'disabled':''}>← 上一题</button>
      <button class="btn btn-outline" onclick="nextExamQ()" ${currentIndex>=total-1?'disabled':''}>下一题 →</button>

// ── Question renderer ──────────────────────────────────────────
function renderQuestion(q, userAnswer, submitted, results){
  const typeLabel=getTypeLabel(q.type);
  const typeClass=q.type;
  let body='';
  const labels=Object.keys(q.options||{});

  if(q.type==='single'){
    body=`<div class="options">`;
    labels.forEach(l=>{
      const sel=userAnswer===l?'selected':'';
      let cls='option '+sel;
      if(submitted){
        if(q.answer===l)cls+=' correct disabled';
        else if(userAnswer===l&&l!==q.answer)cls+=' wrong disabled';
        else cls+=' disabled';
      }
      body+=`<div class="${cls}" onclick="handleAnswer('${q.id}','${l}')">
        <div class="marker">${l}</div>
        <div class="text">${q.options[l]}</div>
      </div>`;
    });
    body+=`</div>`;
  }
  else if(q.type==='multiple'){
    const selected=Array.isArray(userAnswer)?userAnswer:[];
    body=`<div class="options">`;
    labels.forEach(l=>{
      const sel=selected.includes(l)?'selected':'';
      let cls='option multi '+sel;
      if(submitted){
        const correct=Array.isArray(q.answer)&&q.answer.includes(l);
        const userSel=selected.includes(l);
        if(correct&&userSel)cls+=' correct disabled';
        else if(correct&&!userSel)cls+=' correct disabled';
        else if(!correct&&userSel)cls+=' wrong disabled';
        else cls+=' disabled';
      }
      const checkMark=selected.includes(l)?'✓':'';
      body+=`<div class="${cls}" onclick="handleMulti('${q.id}','${l}')">
        <div class="marker multi">${checkMark}</div>
        <div class="text">${q.options[l]}</div>
      </div>`;
    });
    body+=`</div>`;
  }
  else if(q.type==='judge'){
    const options=[{l:'对',v:true},{l:'错',v:false}];
    body=`<div class="options">`;
    options.forEach(o=>{
      const sel=userAnswer!==undefined&&userAnswer===o.v?'selected':'';
      let cls='option '+sel;
      if(submitted){
        if(q.answer===o.v)cls+=' correct disabled';
        else if(userAnswer!==undefined&&userAnswer===o.v&&o.v!==q.answer)cls+=' wrong disabled';
        else cls+=' disabled';
      }
      body+=`<div class="${cls}" onclick="handleAnswer('${q.id}',${o.v})">
        <div class="marker">${o.l}</div>
        <div class="text">${o.l}</div>
      </div>`;
    });
    body+=`</div>`;
  }
  else if(q.type==='essay'){
    const val=userAnswer||'';
    const disabled=submitted?'disabled':'';
    body=`<textarea class="essay-input" ${disabled} placeholder="请输入你的答案..." oninput="handleEssay('${q.id}',this.value)">${val}</textarea>`;
    if(submitted && results){
      const matched=results.matched||0;
      const totalKw=q.keywords?q.keywords.length:0;
      body+=`<div class="essay-result"><strong>${matched>=totalKw*0.5?'✓':'✗'}</strong> 命中关键词 ${matched}/${totalKw}`;
      if(q.keywords){
        body+=` · 关键词：<span style="color:var(--primary);font-weight:500">${q.keywords.join('、')}</span>`;
      }
      body+=`<br>参考回答：<span class="expected">${q.answer}</span></div>`;
    }
  }

  let expHtml='';
  if(submitted){
    expHtml=renderExplanation(q.explanation);
  }

  return `<div class="q-meta">
    <span class="q-type ${typeClass}">${typeLabel}</span>
    ${submitted&&results?`<span style="font-size:13px;font-weight:500;color:${results.correct?'var(--green)':'var(--red)'}">${results.correct?'✓ 正确':'✗ 错误'}</span>`:''}
  </div>
  <div class="q-text">${q.question}</div>
  ${body}
  ${submitted?`<div style="margin-top:12px;font-size:13px;color:var(--text2)">${q.type==='multiple'?'正确答案：'+[...(Array.isArray(q.answer)?q.answer:[q.answer])].join('、'):q.type==='single'?'正确答案：'+q.answer:q.type==='judge'?'正确答案：'+(q.answer?'对':'错'):''}</div>`:''}
  ${expHtml}`;
}

function handleMulti(qid, label){
  if(!examState||examState.submitted)return;
  let arr=examState.answers.get(qid)||[];
  if(!Array.isArray(arr))arr=[];
  if(arr.includes(label))arr=arr.filter(l=>l!==label);
  else arr.push(label);
  examState.answers.set(qid,arr);
  renderExam();
}

function handleEssay(qid, val){
  if(!examState||examState.submitted)return;
  examState.answers.set(qid, val.trim());
}

// ── Submit Exam ────────────────────────────────────────────────
function submitExam(){
  if(!examState)return;
  const {questions,answers}=examState;
  const unanswered=questions.filter(q=>!answers.has(q.id));
  if(unanswered.length>0){
    if(!confirm(`还有 ${unanswered.length} 题未作答，确定要提交吗？`))return;
  }

  const results = [];
  questions.forEach(q=>{
    const ua=answers.get(q.id);
    let correct=false, matched=0;
    if(q.type==='single'){
      correct=ua===q.answer;
    }else if(q.type==='multiple'){
      if(Array.isArray(ua)&&Array.isArray(q.answer)){
        const s1=new Set(ua),s2=new Set(q.answer);
        correct=s1.size===s2.size&&[...s1].every(v=>s2.has(v));
      }else{correct=false}
    }else if(q.type==='judge'){
      correct=ua===q.answer;
    }else if(q.type==='essay'){
      if(ua&&q.keywords){
        const uaLower=ua.toLowerCase();
        matched=q.keywords.filter(k=>uaLower.includes(k.toLowerCase())).length;
        correct=matched>=q.keywords.length*0.5;
      }else{correct=!ua&&!q.answer}
    }
    results.push({q,userAnswer:ua,correct,matched});

    // record wrong answers
    if(!correct){
      if(!state.wrongIds.includes(q.id)){
        state.wrongIds.push(q.id);
      }
      state.wrongHistory.push({questionId:q.id,userAnswer:ua,correctAnswer:q.answer,timestamp:Date.now()});
    }else{
      // if they got it right now, optionally remove from wrong bank
      state.wrongIds=state.wrongIds.filter(id=>id!==q.id);
    }
  });
  saveState();

  examState.submitted=true;
  examState.results=results;
  renderExamReview();
  showView('exam-review');
}

// ── Override global handlers for wrong & practice ──────────────
// These are called from inline onclick in rendered HTML.
// We need to route them to the correct handler based on context.

// Patch: we use the original handler names but they're assigned globally.
// For wrong practice, we need different handlers. Let's use a routing approach.

// Replace the original handleAnswer etc with context-aware versions.
const _origHandleAnswer = window.handleAnswer;
const _origHandleMulti = window.handleMulti;
const _origHandleEssay = window.handleEssay;

window.handleAnswer = function(qid, answer){
  if(wrongPracticeState&&!wrongPracticeState.submitted){
    handleWrongAnswer(qid, answer);
  } else if(practiceState&&!practiceState.submitted){
    handlePracticeAnswer(qid, answer);
  } else {
    _origHandleAnswer(qid, answer);
  }
};

window.handleMulti = function(qid, label){
  if(wrongPracticeState&&!wrongPracticeState.submitted){
    handleWrongMulti(qid, label);
  } else if(practiceState&&!practiceState.submitted){
    handlePracticeMulti(qid, label);
  } else {
    _origHandleMulti(qid, label);
  }
};

window.handleEssay = function(qid, val){
  if(wrongPracticeState&&!wrongPracticeState.submitted){
    handleWrongEssay(qid, val);
  } else if(practiceState&&!practiceState.submitted){
    handlePracticeEssay(qid, val);
  } else {
    _origHandleEssay(qid, val);
  }
};

  if(p.classList.contains('open')) renderNotifs();
}
function renderNotifs(){
  const list=document.getElementById('notifList');
  const notifs=getNotifs();
  if(notifs.length===0){
    list.innerHTML='<div class="notif-empty">暂无通知</div>';
    return;
  }
  list.innerHTML=notifs.map(n=>{
    const d=new Date(n.time);
    const ts=d.toLocaleString('zh-CN',{hour:'2-digit',minute:'2-digit'});
    return '<div class="notif-item"><span class="icon">'+n.icon+'</span><span class="text">'+n.text+'</span><span class="time">'+ts+'</span></div>';
  }).join('');
}
function updateNotifBadge(){
  const btn=document.getElementById('notifBtn');
  const cnt=getNotifs().length;
  btn.classList.toggle('has-unread',cnt>0);
  btn.textContent=cnt>0?'🔔'+cnt:'🔔';
}

function addNotifForResults(results){

  }else{
    addNotif('🎉','全部答对！太棒了！');
  }
}

// ── Study Reminders ────────────────────────────────────────────
const REMINDER_KEY='quiz_reminder';

function setReminder(){
  if(!('Notification'in window)){toast('浏览器不支持通知功能');return}
  if(Notification.permission==='denied'){toast('通知已被拒绝，请在浏览器设置中开启');return}
  if(Notification.permission==='default'){Notification.requestPermission()}
  
  // Show dialog
  const panel=document.getElementById('notifPanel');
  panel.innerHTML='<div class="notif-panel-header"><span>⏰ 学习提醒</span><button class="btn btn-sm" onclick="toggleNotifPanel();renderNotifs()">← 返回</button></div>';
  panel.innerHTML+='<div style="padding:16px">';
  panel.innerHTML+='<p style="font-size:14px;color:var(--text2);margin-bottom:12px">设置提醒频率，到时间会弹出通知提醒你刷题</p>';
  const intervals=[{l:'30 分钟',v:30},{l:'1 小时',v:60},{l:'2 小时',v:120},{l:'4 小时',v:240}];
  intervals.forEach(({l,v})=>{
    panel.innerHTML+='<button class="btn btn-outline btn-sm" onclick="startReminder('+v+')" style="margin-right:6px;margin-bottom:6px">'+l+'</button>';
  });
  panel.innerHTML+='<br><br><button class="btn btn-danger btn-sm" onclick="stopReminder()">取消提醒</button>';
  panel.innerHTML+='<div id="reminderStatus" style="margin-top:12px;font-size:13px;color:var(--text2)"></div>';
  panel.innerHTML+='</div>';
  panel.classList.add('open');
  
  // Show current status
  const existing=localStorage.getItem(REMINDER_KEY);
  if(existing){
    const data=JSON.parse(existing);
    document.getElementById('reminderStatus').textContent='当前提醒：每 '+data.interval+' 分钟一次';
  }
}

function startReminder(minutes){
  if(!('Notification'in window)){toast('浏览器不支持通知功能');return}
  if(Notification.permission==='default'){Notification.requestPermission()}
  if(Notification.permission==='granted'){
    // Clear existing
    if(window._reminderTimer)clearInterval(window._reminderTimer);
    localStorage.setItem(REMINDER_KEY,JSON.stringify({interval:minutes,started:Date.now()}));
    window._reminderTimer=setInterval(()=>{
      new Notification('📚 刷题提醒',{body:'该刷题啦！打开刷题助手练几道吧',icon:'https://github.githubassets.com/favicons/favicon.svg'});
    },minutes*60*1000);
    document.getElementById('reminderStatus').textContent='✅ 已设置：每 '+minutes+' 分钟提醒一次';
    toast('提醒已设置（每 '+minutes+' 分钟）');
    addNotif('⏰','已设置学习提醒：每 '+minutes+' 分钟一次');
  }
}

function stopReminder(){
  if(window._reminderTimer)clearInterval(window._reminderTimer);
  localStorage.removeItem(REMINDER_KEY);
  document.getElementById('reminderStatus').textContent='⏹ 已取消提醒';
  toast('已取消学习提醒');
}

// Check saved reminder on load
function checkSavedReminder(){
  const raw=localStorage.getItem(REMINDER_KEY);
  if(raw){
    try{
      const data=JSON.parse(raw);
      startReminder(data.interval);
    }catch(e){}
  }
}

// ── Browse ────────────────────────────────────────────────────
function renderBrowse(){
  const container=document.getElementById('browseContent');
  const sections=[...new Set(QUESTION_BANK.map(q=>q.section||'其他'))];
  
  let html='<h2 style="margin-bottom:16px">题库浏览</h2><div style="margin-bottom:16px">';
  
  // Filter controls
  html+='<div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px">';
  html+='<input id="browseSearch" placeholder="搜索题目..." style="flex:1;min-width:200px;padding:8px 12px;border-radius:6px;border:1px solid var(--border);font-size:14px">';
  html+='<select id="browseTypeFilter" style="padding:8px 12px;border-radius:6px;border:1px solid var(--border);font-size:14px;background:var(--surface)">';
  html+='<option value="">全部题型</option><option value="single">单选题</option><option value="multiple">多选题</option><option value="judge">判断题</option><option value="essay">简答题</option>';
  html+='</select>';
  html+='<select id="browseSectionFilter" style="padding:8px 12px;border-radius:6px;border:1px solid var(--border);font-size:14px;background:var(--surface)">';
  html+='<option value="">全部章节</option>';
  sections.forEach(s=>{html+='<option value="'+escHtml(s)+'">'+escHtml(s)+'</option>'});
  html+='</select>';
  html+='</div></div>';
  
  // Stats
  html+='<div class="stat-grid" style="margin-bottom:16px">';
  html+='<div class="stat-card blue"><div class="num">'+QUESTION_BANK.length+'</div><div class="label">总题数</div></div>';
  ['single','multiple','judge','essay'].forEach(t=>{
    const cnt=QUESTION_BANK.filter(q=>q.type===t).length;
    const labels={single:'单选题',multiple:'多选题',judge:'判断题',essay:'简答题'};
    const colors={single:'var(--primary)',multiple:'var(--amber)',judge:'var(--green)',essay:'#be185d'};
    html+='<div class="stat-card"><div class="num" style="color:'+colors[t]+'">'+cnt+'</div><div class="label">'+labels[t]+'</div></div>';
  });
  html+='</div>';
  
  // Sections expandable list
  sections.forEach(s=>{
    const qs=QUESTION_BANK.filter(q=>(q.section||'其他')===s);
    html+='<div class="card" style="margin-bottom:8px;padding:0;overflow:hidden">';
    html+='<div class="browse-section" data-section="'+escHtml(s)+'" style="padding:14px 18px;cursor:pointer;display:flex;align-items:center;justify-content:space-between;font-weight:600;font-size:15px;border-bottom:1px solid var(--border)">';
    html+='<span>📁 '+escHtml(s)+' <span style="font-weight:400;color:var(--text2);font-size:13px">'+qs.length+'题</span></span>';
    html+='<span class="browse-arrow" style="transition:.2s">▶</span>';
    html+='</div>';
    html+='<div class="browse-questions" style="display:none;padding:8px 0"></div>';
    html+='</div>';
  });
  
  container.innerHTML=html;
  
  // Event listeners
  document.getElementById('browseSearch').addEventListener('input', filterBrowse);
  document.getElementById('browseTypeFilter').addEventListener('change', filterBrowse);
  document.getElementById('browseSectionFilter').addEventListener('change', filterBrowse);
  
  document.querySelectorAll('.browse-section').forEach(el=>{
    el.addEventListener('click', function(){
      const body=this.nextElementSibling;
      const arrow=this.querySelector('.browse-arrow');
      const isOpen=body.style.display==='block';
      body.style.display=isOpen?'none':'block';
      arrow.style.transform=isOpen?'rotate(0deg)':'rotate(90deg)';
      if(!isOpen&&body.children.length===0){
        const section=this.dataset.section;
        renderBrowseQuestions(section,body);
      }
    });
  });
}

function escHtml(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}

function getTypeBadge(t){
  const m={single:['单选题','single'],multiple:['多选题','multiple'],judge:['判断题','judge'],essay:['简答题','essay']};
  const [label,cls]=m[t]||['?',''];
  return '<span class="q-type '+cls+'">'+label+'</span>';
}

function renderBrowseQuestions(section,container){
  let qs=QUESTION_BANK.filter(q=>(q.section||'其他')===section);
  const typeFilter=document.getElementById('browseTypeFilter').value;
  const searchQuery=document.getElementById('browseSearch').value.toLowerCase();
  
  if(typeFilter) qs=qs.filter(q=>q.type===typeFilter);
  if(searchQuery) qs=qs.filter(q=>q.question.toLowerCase().includes(searchQuery));
  
  if(qs.length===0){
    container.innerHTML='<div style="padding:20px;text-align:center;color:var(--text3)">暂无匹配题目</div>';
    return;
  }
  
  container.innerHTML=qs.map((q,i)=>{
    let ansHtml='';
    if(q.type==='single'){
      const ans=q.answer;
      ansHtml='<div style="margin-top:8px;font-size:13px">✅ 正确答案：<strong style="color:var(--green)">'+ans+'</strong> — '+escHtml(q.options[ans])+'</div>';
    }else if(q.type==='multiple'){
      const ans=Array.isArray(q.answer)?q.answer:[q.answer];
      ansHtml='<div style="margin-top:8px;font-size:13px">✅ 正确答案：<strong style="color:var(--green)">'+ans.join('、')+'</strong></div>';
    }else if(q.type==='judge'){
      ansHtml='<div style="margin-top:8px;font-size:13px">✅ 正确答案：<strong style="color:var(--green)">'+(q.answer?'对':'错')+'</strong></div>';
    }else if(q.type==='essay'){
      ansHtml='<div style="margin-top:8px;font-size:13px">📝 参考回答：<span style="color:var(--primary)">'+escHtml(q.answer||'')+'</span></div>';
    }
    
    let optsHtml='';
    if(q.options){
      optsHtml='<div style="margin-top:6px;font-size:13px;color:var(--text2)">'+Object.entries(q.options).map(([k,v])=>'<span style="margin-right:12px">'+k+'. '+escHtml(v)+'</span>').join('')+'</div>';
    }
    
    return '<div style="padding:12px 14px;border-bottom:1px solid var(--border)">'+
      '<div style="display:flex;align-items:center;gap:8px;margin-bottom:4px">'+
      getTypeBadge(q.type)+
      '<span style="font-size:12px;color:var(--text3)">#'+(i+1)+'</span>'+
      '</div>'+
      '<div style="font-size:14px;font-weight:500;margin-bottom:4px">'+escHtml(q.question)+'</div>'+
      optsHtml+
      ansHtml+
      (q.explanation?'<div style="margin-top:6px;font-size:13px;color:var(--amber)">💡 '+escHtml(q.explanation)+'</div>':'')+
      '</div>';
  }).join('');
}

function filterBrowse(){
  const sectionFilter=document.getElementById('browseSectionFilter').value;
  if(sectionFilter){
    const el=document.querySelector('.browse-section[data-section="'+escHtml(sectionFilter)+'"]');
    if(el){
      // Close all others, open this one
      document.querySelectorAll('.browse-questions').forEach(b=>{b.style.display='none';b.previousElementSibling.querySelector('.browse-arrow').style.transform='rotate(0deg)'});
      const body=el.nextElementSibling;
      body.style.display='block';
      el.querySelector('.browse-arrow').style.transform='rotate(90deg)';
      renderBrowseQuestions(sectionFilter, body);
    }
  } else {
    // Filter within all open sections
    document.querySelectorAll('.browse-questions').forEach(body=>{
      if(body.style.display==='block'){
        const section=body.previousElementSibling.dataset.section;
        renderBrowseQuestions(section, body);
      }
    });
  }
}
